services:
  db:
    image: postgres:16-alpine
    container_name: pencachi-prod-db
    ports:
      - "127.0.0.1:5436:5432"
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pencachi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  web:
    image: ghcr.io/imasdev-org/pencachi/web:latest
    container_name: pencachi-prod-web
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST}
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY}
      API_FOOTBALL_LEAGUE_ID: ${API_FOOTBALL_LEAGUE_ID}
      API_FOOTBALL_SEASON: ${API_FOOTBALL_SEASON}
      CRON_SECRET: ${CRON_SECRET}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
    volumes:
      - uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - default
      - webproxy
    restart: unless-stopped
volumes:
  pgdata:
  uploads:
networks:
  webproxy:
    external: true
